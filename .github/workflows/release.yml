name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # ── Build AppImage on Linux ─────────────────────────────────────────
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set version from tag
        run: pnpm version ${GITHUB_REF_NAME#v} --no-git-tag-version
        shell: bash

      - name: Build Vite
        run: pnpm run build:vite

      - name: Build AppImage
        run: pnpm exec electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist-electron/*.AppImage
          if-no-files-found: error

  # ── Build NSIS installer on Windows ────────────────────────────────
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set version from tag
        run: pnpm version ${GITHUB_REF_NAME#v} --no-git-tag-version
        shell: bash

      - name: Build Vite
        run: pnpm run build:vite

      - name: Build NSIS installer
        run: pnpm exec electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-electron/*.exe
          if-no-files-found: error

  # ── Build DMG on macOS ──────────────────────────────────────────────
  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set version from tag
        run: pnpm version ${GITHUB_REF_NAME#v} --no-git-tag-version
        shell: bash

      - name: Build Vite
        run: pnpm run build:vite

      - name: Build DMG
        run: pnpm exec electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist-electron/*.dmg
          if-no-files-found: error

  # ── Create GitHub Release with all artifacts ────────────────────────
  release:
    name: Publish release
    needs: [build-linux, build-windows, build-mac]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/linux-appimage/*.AppImage
            artifacts/windows-installer/*.exe
            artifacts/mac-dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
